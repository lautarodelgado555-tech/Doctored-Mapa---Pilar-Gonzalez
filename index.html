const ZONE_COLORS = {"CABA": "#1A5276", "GBA NORTE": "#1D6A36", "GBA OESTE": "#B84A00", "GBA SUR": "#7B5C00"};

const map = L.map('map', {zoomControl:true});
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);

const pinCache = {};
function makePin(color, r) {
  const key = color+r;
  if(pinCache[key]) return pinCache[key];
  const w=r*2, h=r*2.6;
  const svg = `<svg width="${w}" height="${h}" viewBox="0 0 40 56" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="20" cy="53" rx="8" ry="3" fill="rgba(0,0,0,0.12)"/>
    <path d="M20 1C10.059 1 2 9.059 2 19C2 32 20 53 20 53C20 53 38 32 38 19C38 9.059 29.941 1 20 1Z"
          fill="${color}" stroke="white" stroke-width="2.5"/>
    <circle cx="20" cy="19" r="7" fill="white" opacity="0.88"/>
  </svg>`;
  const icon = L.divIcon({html:svg, className:'', iconSize:[w,h], iconAnchor:[w/2,h], popupAnchor:[0,-h+6]});
  pinCache[key] = icon;
  return icon;
}

centers.forEach(c => {
  const color = ZONE_COLORS[c.zone] || '#888';
  const r = c.level===2 ? 20 : c.level===1 ? 14 : 10;
  const alpha = c.level===2 ? color : c.level===1 ? color+'cc' : '#aaaaaa';
  const icon = makePin(c.level===0 ? '#aaaaaa' : color, r);
  const marker = L.marker([c.lat,c.lon],{icon}).addTo(map);

  const zoneLabel = c.zone==='CABA' ? 'CABA' : c.zone.replace('GBA ','');
  const zonePill = `<span class="zone-pill" style="background:${color}">${zoneLabel}</span>`;

  let badge='';
  if(c.level===2) badge=`<div class="badge" style="background:${color}">&#11088; Destacado</div>`;
  else if(c.level===1) badge=`<div class="badge" style="background:${color}88">Centro m&eacute;dico</div>`;

  const dir = c.direccion ? `<div class="padr">${c.direccion}</div>` : '';
  marker.bindPopup(
    `<div class="pip" style="border-top:3.5px solid ${color}">${zonePill}${badge}<div class="pname">${c.nombre}</div><div class="ploc">&#128205; ${c.localidad}</div>${dir}</div>`
  );
});

if(centers.length) {
  map.fitBounds(L.latLngBounds(centers.map(c=>[c.lat,c.lon])), {padding:[28,28], maxZoom:12});
}
